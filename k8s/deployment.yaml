apiVersion: apps/v1
kind: Deployment
metadata:
  name: powerpulse-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: powerpulse-frontend
  template:
    metadata:
      labels:
        app: powerpulse-frontend
    spec:
      containers:
      - name: frontend
        image: rajeshwar2473/powerpulse-frontend:latest
        ports:
          - containerPort: 80